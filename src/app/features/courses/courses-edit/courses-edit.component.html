<form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
  <div class="d-flex align-items-center mb-4">
    <div class="btn-group me-3">
      <button type="button" class="btn btn-outline-purple rounded-circle" routerLink="/courses">
        <span aria-label="Go back to courses list"><i class="fas fa-arrow-left"></i></span>
      </button>
      <button type="submit" class="btn btn-outline-success rounded-circle mx-sm-2" [disabled]="!courseForm.valid">
        <span aria-label="Save course"><i class="fas fa-check-double"></i></span>
      </button>
      <button type="button" class="btn btn-outline-danger rounded-circle" (click)="onDelete()">
        <span aria-label="Delete course"><i class="fas fa-trash"></i></span>
      </button>
    </div>

    <h1 class="mb-0">Edit Course</h1>
  </div>

  <div class="row g-3">
    <div class="mb-3 col-md-6">
      <label for="name">Name</label>
      <input type="text" id="name" class="form-control" formControlName="name" placeholder="Course name...">
    </div>
  </div>

  <div class="mb-3">
    <label for="description">Description</label>
    <textarea id="description" cols="30" rows="6" class="form-control" formControlName="description"></textarea>
  </div>
</form>
