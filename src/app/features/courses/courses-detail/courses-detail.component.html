<div class="d-flex align-items-center mb-4">
  <button class="btn btn-outline-purple rounded-circle me-3" routerLink="/courses">
    <span aria-label="Go back to courses list"><i class="fas fa-arrow-left"></i></span>
  </button>

  <h1 class="mb-0">Course: {{course.name}}</h1>
</div>

<h2 class="mb-3">Description</h2>
<p>{{course.description}}</p>

<div class="d-flex align-items-center my-4">
  <button class="btn btn-outline-purple rounded-circle me-3" routerLink="/students/new"
    [queryParams]="{ cid: course.id }">
    <span aria-label="Add new student"><i class="fas fa-plus"></i></span>
  </button>

  <h2 class="mb-0">Students <span class="badge badge-purple">{{course.students.length}}</span></h2>
</div>

<app-student-card-list [students]="course.students">
</app-student-card-list>
